specVersion: 0.36.0
name: thumbnailer
runtime: python
registry: image-registry.openshift-image-registry.svc:5000/foobar
namespace: foobar
created: 2026-06-17T15:45:13.606646728+02:00
build:
  builder: pack
run:
  envs:
  - name: INPUT_BUCKET_HOST
    value: '{{ configMap:foo-bucket:BUCKET_HOST }}'
  - name: INPUT_BUCKET_PORT
    value: '{{ configMap:foo-bucket:BUCKET_PORT }}'
