# $schema: https://raw.githubusercontent.com/knative/func/release-1.22/schema/func_yaml-schema.json
# yaml-language-server: $schema=https://raw.githubusercontent.com/knative/func/release-1.22/schema/func_yaml-schema.json
specVersion: 0.36.0
name: thumbnailer
runtime: python
registry: image-registry.openshift-image-registry.svc:5000/foobar
namespace: foobar
created: 2026-06-17T15:45:13.606646728+02:00
invoke: cloudevent
build:
  builder: pack
run:
  envs:
  - name: S3_HOST
    value: s3.openshift-storage.svc
  - name: AWS_ACCESS_KEY_ID
    value: '{{ secret:noobaa-account-foobar-ns-account:AWS_ACCESS_KEY_ID }}'
  - name: AWS_SECRET_ACCESS_KEY
    value: '{{ secret:noobaa-account-foobar-ns-account:AWS_SECRET_ACCESS_KEY }}'
deploy:
  namespace: foobar
  image: image-registry.openshift-image-registry.svc:5000/foobar/thumbnailer@sha256:e3432992bd897131276ad1bb11dac73f38f5da0c148f8f0b9df35a71f879be60
  deployer: raw
